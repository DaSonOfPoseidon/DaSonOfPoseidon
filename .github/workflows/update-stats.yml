name: Update GitHub Stats Cards

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # === DARK THEME — readme-tools cards ===
      - name: GitHub Stats (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=DaSonOfPoseidon&
            show_icons=true&
            theme=github_dark&
            hide_border=true&
            bg_color=0d1117&
            title_color=58a6ff&
            icon_color=58a6ff&
            text_color=c9d1d9&
            include_all_commits=true
          path: cards/dark/github-stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Top Languages (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=DaSonOfPoseidon&
            layout=compact&
            theme=github_dark&
            hide_border=true&
            bg_color=0d1117&
            title_color=58a6ff&
            text_color=c9d1d9&
            include_private=true
          path: cards/dark/top-languages.svg
          token: ${{ secrets.STATS_TOKEN }}

      # === LIGHT THEME — readme-tools cards ===
      - name: GitHub Stats (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=DaSonOfPoseidon&
            show_icons=true&
            theme=default&
            hide_border=true&
            include_all_commits=true
          path: cards/light/github-stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Top Languages (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=DaSonOfPoseidon&
            layout=compact&
            theme=default&
            hide_border=true&
            include_private=true
          path: cards/light/top-languages.svg
          token: ${{ secrets.STATS_TOKEN }}

      # === STREAK STATS (curl — dark + light) ===
      - name: Streak Stats (dark + light)
        run: |
          mkdir -p cards/dark cards/light
          curl -sf -o cards/dark/streak-stats.svg \
            "https://streak-stats.demolab.com?user=DaSonOfPoseidon&theme=github-dark-blue&hide_border=true&background=0d1117&ring=58a6ff&fire=58a6ff&currStreakLabel=58a6ff"
          curl -sf -o cards/light/streak-stats.svg \
            "https://streak-stats.demolab.com?user=DaSonOfPoseidon&theme=default&hide_border=true"

      # === PROFILE SUMMARY CARDS (dark + light) ===
      - name: Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
        with:
          USERNAME: DaSonOfPoseidon
          BRANCH_NAME: main
          UTC_OFFSET: -6
          AUTO_PUSH: false

      - name: Move summary cards (dark + light)
        run: |
          mkdir -p cards/summary/dark cards/summary/light
          cp profile-summary-card-output/github_dark/*.svg cards/summary/dark/
          cp profile-summary-card-output/default/*.svg cards/summary/light/
          rm -rf profile-summary-card-output

      # === COMMIT ===
      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards/
          git diff --staged --quiet || git commit -m "chore: update stats cards"
          git push
